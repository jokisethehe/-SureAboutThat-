<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Checker - TA</title>
    
    <!-- Import Font -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600;1,700&family=Rubik:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Palet Warna */
            --bg-color: #00315b;       
            --sidebar-bg: #011935;     
            --text-color: #F3F1EE;     
            --accent: #E6FF00;         
            
            --input-bg: rgba(255, 255, 255, 0.1);
            --border-color: rgba(255, 255, 255, 0.2);
            --hover-bg: rgba(255, 255, 255, 0.15);
            --active-bg: #E6FF00;
            --active-text: #011935;
            --user-avatar: #e0e0e0;
            --topbar-bg: #00315b;
            --user-msg-bg: rgba(255, 255, 255, 0.1);
            --modal-bg: #8b8e78;

            /* Deklarasi Font Variable */
            --font-sans: 'IBM Plex Sans', sans-serif;
            --font-mono: 'IBM Plex Mono', monospace;
            --font-rubik: 'Rubik', sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font-sans); transition: background-color 0.3s, color 0.3s; }
        body { background-color: var(--bg-color); color: var(--text-color); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 280px; background-color: var(--sidebar-bg); padding: 20px 10px; display: flex; flex-direction: column; border-right: 1px solid var(--border-color); z-index: 10; transition: margin-left 0.3s ease; flex-shrink: 0; }
        .sidebar.collapsed { margin-left: -280px; }
        .sidebar-header { position: relative; display: flex; justify-content: center; align-items: flex-start; padding: 10px 0; margin-bottom: 30px; }
        .sidebar-logo { height: 99px; object-fit: contain; }
        .menu-btn { position: absolute; top: 0; right: 10px; background: none; border: none; color: var(--text-color); font-size: 24px; cursor: pointer; }
        
        .new-chat { background-color: transparent; color: var(--text-color); border: 1px solid var(--border-color); padding: 10px 15px; border-radius: 20px; cursor: pointer; text-align: left; font-size: 14px; display: flex; align-items: center; gap: 10px; margin: 0 10px 20px 10px; }
        .new-chat:hover { background-color: var(--hover-bg); }
        .history-title { font-size: 11px; font-weight: bold; margin-bottom: 10px; padding-left: 15px; opacity: 0.6; text-transform: uppercase; letter-spacing: 1px; }
        .history-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
        .history-item { padding: 10px 15px; border-radius: 20px; cursor: pointer; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin: 0 5px; color: var(--text-color); }
        .history-item:hover { background-color: var(--hover-bg); }
        .history-item.active { background-color: var(--active-bg); color: var(--active-text); font-weight: bold; }
        
        .setting-btn { margin: 10px; background: transparent; color: var(--text-color); border: none; padding: 12px 15px; cursor: pointer; display: flex; align-items: center; justify-content: space-between; font-weight: bold; font-size: 14px; opacity: 0.8; border-radius: 12px;}
        .setting-btn:hover { opacity: 1; background-color: var(--hover-bg); }

        /* Dropdown Menu Clean */
        .dropdown { position: relative; width: calc(100% - 20px); margin: auto auto 10px auto; }
        .dropdown-content { display: none; position: absolute; background-color: var(--sidebar-bg); width: 100%; box-shadow: 0px -5px 15px rgba(0,0,0,0.3); z-index: 100; border: 1px solid var(--border-color); border-radius: 12px; bottom: 110%; left: 0; overflow: hidden;}
        .dropdown-content button { color: var(--text-color); padding: 12px 15px; text-decoration: none; display: flex; align-items: center; gap: 10px; background: transparent; border: none; width: 100%; cursor: pointer; font-weight: bold; font-size: 14px; text-align: left; }
        .dropdown-content button:hover { background-color: var(--hover-bg); }
        .show { display: block; }

        /* Main Content */
        .main-content { flex: 1; display: flex; flex-direction: column; position: relative; min-width: 0; }
        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; height: 60px; background-color: var(--topbar-bg); z-index: 5; }
        .top-nav-left { display: flex; align-items: center; gap: 15px; }
        .floating-hamburger { background: none; border: none; color: var(--text-color); font-size: 24px; cursor: pointer; display: none; }
        .sidebar.collapsed ~ .main-content .floating-hamburger { display: block; }
        .app-title { font-size: 20px; font-weight: bold; font-family: var(--font-mono); opacity: 0.8;}
        .top-nav-right { display: flex; align-items: center; gap: 15px; }
        .pro-badge { background-color: var(--accent); color: var(--active-text); padding: 4px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; font-family: var(--font-mono); }
        .top-avatar { width: 40px; height: 40px; border-radius: 50%; background-color: var(--user-avatar); color: var(--active-text); display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px; }

        /* Center View */
        .center-view { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; padding: 0 20px; width: 100%; }
        .greeting-container { width: 100%; max-width: 800px; margin-bottom: 40px; text-align: left; }
        .greeting .highlight { font-family: var(--font-rubik); font-size: 70px; font-weight: 700; color: var(--accent); display: block; line-height: 1; margin-bottom: 15px; }
        .greeting span { font-family: var(--font-mono); font-size: 22px; font-weight: 700; color: var(--text-color); }

        /* Chat View */
        .chat-view { display: none; flex-direction: column; flex: 1; overflow: hidden; width: 100%; }
        .chat-scroll-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; align-items: center; width: 100%; }
        .chat-container { padding: 20px 20px; display: flex; flex-direction: column; gap: 30px; width: 100%; max-width: 800px; }

        /* Messages */
        .message-row { display: flex; max-width: 100%; align-items: flex-start; }
        .message-row.user { justify-content: flex-end; width: 100%; }
        .user .message-content { background-color: var(--user-msg-bg); padding: 15px 20px; border-radius: 20px; display: inline-block; max-width: 80%; word-wrap: break-word; color: var(--text-color); border: 1px solid var(--border-color); font-family: var(--font-sans); line-height: 1.5; }
        .message-row.ai { justify-content: flex-start; gap: 15px; width: 100%; }
        .ai .message-content { padding: 5px 0; line-height: 1.6; background-color: transparent; max-width: calc(100% - 50px); color: var(--text-color); font-family: var(--font-sans); }
        .msg-image-preview { max-width: 250px; border-radius: 10px; margin-top: 10px; margin-bottom: 10px; display: block; }

        /* Thinking Block */
        .message-row.thinking { justify-content: flex-start; width: 100%; gap: 15px; margin-bottom: -15px; }
        .thinking-content { display: flex; align-items: center; gap: 10px; color: var(--text-color); font-size: 14px; padding: 5px 0; font-weight: 600; font-family: var(--font-mono); opacity: 0.8;}
        .thinking-star { color: var(--accent); font-size: 18px; display: inline-block; }
        .thinking-star.spin { animation: spinStar 1.5s linear infinite; }
        @keyframes spinStar { 100% { transform: rotate(360deg); } }

        /* Input Area */
        .input-area { width: 100%; display: flex; justify-content: center; padding: 20px 20px; background-color: transparent; flex-shrink: 0; }
        .input-wrapper { width: 100%; max-width: 800px; position: relative; }
        .input-box-container { background-color: var(--input-bg); border-radius: 30px; border: 1px solid var(--border-color); display: flex; flex-direction: column; padding: 5px 10px; width: 100%; transition: border-color 0.3s, background-color 0.3s; }
        .input-box-container.dragover { border: 2px dashed var(--accent); background-color: var(--hover-bg); }
        
        #initImagePreviewContainer, #chatImagePreviewContainer { display: none; padding: 5px 15px 0 15px; position: relative; }
        #initImagePreview, #chatImagePreview { max-height: 80px; border-radius: 8px; display: none; }
        .remove-img { position: absolute; top: 0; right: 10px; background: rgba(0,0,0,0.7); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; cursor: pointer; font-size: 12px; display: none; }
        
        .input-row { display: flex; align-items: center; width: 100%; }
        .input-row input { flex: 1; background: none; border: none; color: var(--text-color); font-size: 14px; padding: 15px 15px; outline: none; min-width: 0; font-family: var(--font-sans);}
        .input-row input::placeholder { color: rgba(255,255,255,0.5); font-family: var(--font-sans); }
        .input-row button { background: none; border: none; color: var(--text-color); cursor: pointer; padding: 10px; font-size: 20px; border-radius: 50%; flex-shrink: 0; opacity: 0.7;}
        .input-row button:hover { opacity: 1; color: var(--accent); }

        /* Widget Kanan */
        .floating-energy { position: fixed; top: 80px; right: 30px; background-color: #e0e6ed; color: #011935; padding: 8px 12px; border-radius: 8px; display: flex; flex-direction: column; gap: 4px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); z-index: 100; font-weight: bold; font-family: var(--font-sans); cursor: grab; user-select: none; display: none; border: 2px solid transparent; transition: border-color 0.3s; }
        .floating-energy:hover { border-color: var(--accent); }
        .floating-energy:active { cursor: grabbing; }
        .floating-energy .title-sesi { font-size: 10px; opacity: 0.6; margin-bottom: 2px; text-align: left; }
        .stat-row { display: flex; align-items: center; gap: 8px; font-size: 12px; font-family: var(--font-sans); }
        .stat-row-icon-img { height: 16px; width: auto; object-fit: contain; } 

        /* MODALS */
        #mainModalOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 2000; justify-content: center; align-items: center; flex-direction: column; perspective: 1500px; }
        .flip-card-container { width: 450px; height: 300px; display: none; }
        .flip-card { width: 100%; height: 100%; position: relative; transition: transform 0.8s cubic-bezier(0.4, 0.2, 0.2, 1); transform-style: preserve-3d; }
        .flip-card.flipped { transform: rotateY(180deg); }
        .flip-card-front, .flip-card-back { position: absolute; width: 100%; height: 100%; backface-visibility: hidden; border-radius: 15px; border: 3px solid var(--accent); display: flex; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .flip-card-front { background-color: #737262; color: white; text-align: center; padding: 20px; }
        .flip-card-front h3 { font-family: var(--font-mono); font-size: 20px; margin-bottom: 20px; letter-spacing: 2px; }
        .flip-card-front p { font-family: var(--font-mono); font-size: 14px; padding: 0 10px; }
        .video-animasi { width: 130px; height: auto; margin-bottom: 20px; }
        .flip-card-back { background-color: var(--accent); transform: rotateY(180deg); padding: 0; overflow: hidden; }
        .flip-card-back img { width: 100%; height: 100%; object-fit: cover; display: block; border-radius: 12px; }
        
        .total-energy-content { display: none; width: 450px; background-color: var(--modal-bg); border-radius: 15px; border: 3px solid var(--accent); padding: 30px; text-align: center; color: white; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .total-energy-content * { font-family: var(--font-mono); }
        .total-energy-content h3 { font-size: 20px; letter-spacing: 2px; margin-bottom: 25px; }
        .te-stats { display: flex; justify-content: center; align-items: baseline; gap: 40px; margin-bottom: 25px; } 
        .te-item { display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 18px; font-weight: bold; } 
        .te-icon-img { height: 45px; width: auto; object-fit: contain; } 
        .te-desc { font-size: 14px; margin-bottom: 30px; line-height: 1.5; color: white; }
        .btn-tutup { background: transparent; border: 1px solid rgba(255,255,255,0.5); color: white; padding: 8px 30px; border-radius: 20px; cursor: pointer; }
        .btn-tutup:hover { background: rgba(255,255,255,0.1); border-color: white; }

        /* MODAL PRINT LOADING & DEBUGGER */
        .print-status-box { background-color: var(--modal-bg); border: 3px solid var(--accent); padding: 30px; border-radius: 15px; text-align: center; color: white; font-family: var(--font-mono); box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 400px; max-width: 90%; }
        .print-status-text { margin-top: 15px; font-weight: bold; font-size: 16px; line-height: 1.5; }
        .btn-debug-tutup { display: none; margin: 20px auto 0 auto; background: var(--accent); color: var(--active-text); border: none; padding: 10px 25px; border-radius: 20px; cursor: pointer; font-weight: bold; }

        /* CSS ODOMETER */
        .odo-container { display: flex; align-items: center; justify-content: center; white-space: nowrap; }
        .zoom-pulse { display: inline-flex; align-items: center; animation: pulseOdo 2.5s ease-in-out forwards; }
        .odo-wrap { display: inline-flex; height: 1.1em; line-height: 1.1em; overflow: hidden; position: relative; align-items: flex-start; }
        .odo-track { display: flex; flex-direction: column; transition: transform 2s cubic-bezier(0.25, 1, 0.5, 1); margin: 0; padding: 0; }
        .odo-track div { height: 1.1em; display: flex; justify-content: center; align-items: center; }
        .static-char { display: inline-flex; height: 1.1em; align-items: center; }
        .odo-suffix { display: inline-flex; align-items: center; margin-left: 6px; }
        @keyframes pulseOdo { 0% { font-size: 1em; } 20% { font-size: 1.5em; } 80% { font-size: 1.5em; } 100% { font-size: 1em; } }

        @media (max-width: 768px) {
            .sidebar { position: absolute; height: 100%; box-shadow: 4px 0 15px rgba(0,0,0,0.5); }
            .top-nav { padding: 10px 15px; }
            .greeting .highlight { font-size: 55px; }
            .chat-container { padding: 15px 10px; gap: 20px; }
            .floating-energy { top: 70px; right: 10px; }
            .flip-card-container, .total-energy-content { width: 90%; }
        }
    </style>
</head>
<body>

    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <img src="logo.png" alt="Logo" class="sidebar-logo" onerror="this.style.display='none'">
            <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        </div>
        
        <button class="new-chat" onclick="createNewChat()">
            <span style="font-size:18px;">+</span> Obrolan Baru
        </button>
        
        <div class="history-title">Riwayat Percakapan</div>
        <div class="history-list" id="historyList"></div>
        
        <div class="dropdown">
            <button class="setting-btn" onclick="toggleDropdown(event)">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <span style="font-size: 18px;">⚙️</span> SETTING
                </div>
                <span style="font-size: 10px;">▼</span>
            </button>
            <div id="settingDropdown" class="dropdown-content">
                <button onclick="setGeminiApiKey()">
                    <span style="font-size: 18px;">🔑</span> API KEY
                </button>
                <button onclick="connectBluetoothPrinter()">
                    <span style="font-size: 18px;">🖨️</span> KONEK PRINTER
                </button>
                <button onclick="resetSession()" style="color: #ff4c4c;">
                    <span style="font-size: 18px;">🔄</span> RESET SESSION
                </button>
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="top-nav">
            <div class="top-nav-left">
                <button class="floating-hamburger" onclick="toggleSidebar()">☰</button>
                <span class="app-title">Energy Checker</span>
            </div>
            <div class="top-nav-right">
                <span class="pro-badge">Pro</span>
                <div class="top-avatar">N</div>
            </div>
        </div>

        <div class="center-view" id="centerView">
            <div class="greeting-container">
                <div class="greeting">
                    <span class="highlight">Halo Bro,</span>
                    <span>Siap cek tagihan dari prompt lu?</span>
                </div>
            </div>
            <div class="input-wrapper">
                <div class="input-box-container" id="initDropZone">
                    <div id="initImagePreviewContainer">
                        <img id="initImagePreview" src="">
                        <button class="remove-img" id="initRemoveImgBtn" onclick="removeImage('init')">×</button>
                    </div>
                    <form class="input-row" onsubmit="handleInitialSend(event)">
                        <input type="text" id="initialPrompt" placeholder="Ketik pertanyaan sepele lo di sini... (Struk karbon akan otomatis dicetak)" autocomplete="off">
                        <button type="submit">➤</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="chat-view" id="chatView">
            <div class="chat-scroll-area" id="chatScrollArea">
                <div class="chat-container" id="chatContainer"></div>
            </div>
            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-box-container" id="chatDropZone">
                        <div id="chatImagePreviewContainer">
                            <img id="chatImagePreview" src="">
                            <button class="remove-img" id="chatRemoveImgBtn" onclick="removeImage('chat')">×</button>
                        </div>
                        <form class="input-row" onsubmit="handleChatSend(event)">
                            <input type="text" id="chatPrompt" placeholder="Ketik pertanyaan sepele lo di sini... (Struk karbon akan otomatis dicetak)" autocomplete="off">
                            <button type="submit">➤</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="floating-energy" id="floatingEnergy" title="Klik untuk lihat total. Seret untuk pindah.">
        <div class="title-sesi">Sesi Saat ini</div>
        <div class="stat-row">
            <img src="airhitam.png" alt="Air" class="stat-row-icon-img"> <span id="floating-total-ml">0</span> ML Air
        </div>
        <div class="stat-row">
            <img src="listrikhitam.png" alt="Listrik" class="stat-row-icon-img"> <span id="floating-total-wh">0.0</span> WH
        </div>
    </div>

    <div id="mainModalOverlay">
        <div class="flip-card-container" id="flipCardContainer">
            <div class="flip-card" id="flipCardElement">
                <div class="flip-card-front">
                    <h3>LIAT NIH...</h3>
                    <video src="animasiair.mp4" autoplay loop muted playsinline class="video-animasi"></video>
                    <p>Prompt ini ngabisin sekitar 50ml air bersih buat dinginin servernya.</p>
                </div>
                <div class="flip-card-back">
                    <img src="logo2.png" alt="Sure About That?" onerror="this.outerHTML='<h1 style=\'color:#011935; font-family:var(--font-mono)\'>SURE<br>ABOUT<br>THAT?</h1>'">
                </div>
            </div>
        </div>

        <div class="total-energy-content" id="totalEnergyContainer">
            <h3>TOTAL ENERGI</h3>
            <div class="te-stats">
                <div class="te-item" style="color: #e1ff28;">
                    <img src="listrik.png" alt="Listrik" class="te-icon-img">
                    <span id="modal-total-wh" class="odo-container">0.0 WH</span>
                </div>
                <div class="te-item" style="color: #b4ecff;">
                    <img src="air.png" alt="Air" class="te-icon-img">
                    <span id="modal-total-ml" class="odo-container">0 ML Air</span>
                </div>
            </div>
            <div class="te-desc">Lumayan yah? padahal gitu doang</div>
            <button class="btn-tutup" onclick="closeModals()">Tutup</button>
        </div>
    </div>

    <!-- MODAL PRINT LOADING & DEBUGGER -->
    <div id="receiptModalOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.85); z-index: 3000; justify-content: center; align-items: center; flex-direction: column;">
        <div class="print-status-box">
            <div style="font-size: 40px; margin-bottom: 10px;">🖨️</div>
            <div class="print-status-text" id="printStatusText">Memproses Gambar...</div>
            <button class="btn-debug-tutup" id="btnTutupPrintDebug" onclick="document.getElementById('receiptModalOverlay').style.display='none'">Tutup Status</button>
        </div>
    </div>

    <script>
        const appData = JSON.parse(localStorage.getItem('aiEcoDataTA')) || { currentChatId: null, chats: {} };
        let currentImageBase64 = null;

        window.onload = () => {
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.add('collapsed');
            if (Object.keys(appData.chats).length === 0) createNewChat(false);
            else { renderHistory(); appData.currentChatId && appData.chats[appData.currentChatId].history.length > 0 ? loadChatView(appData.currentChatId) : showCenterView(); }
            setupDragAndDrop();
        };

        function toggleDropdown(e) {
            if(e) e.stopPropagation();
            document.getElementById("settingDropdown").classList.toggle("show");
        }

        window.onclick = function(event) {
            if (!event.target.closest('.dropdown')) {
                var dropdowns = document.getElementsByClassName("dropdown-content");
                for (var i = 0; i < dropdowns.length; i++) {
                    if (dropdowns[i].classList.contains('show')) {
                        dropdowns[i].classList.remove('show');
                    }
                }
            }
        }

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }
        function saveData() { localStorage.setItem('aiEcoDataTA', JSON.stringify(appData)); renderHistory(); }

        function resetSession() {
            if(confirm("Yakin mau reset semua data sesi?")) {
                localStorage.removeItem('aiEcoDataTA');
                localStorage.removeItem('validGeminiModel'); 
                location.reload();
            }
        }

        function setGeminiApiKey() {
            const current = localStorage.getItem('geminiApiKey') || '';
            const input = prompt("Masukkan Gemini API Key lu (Gratis di Google AI Studio):\nKosongkan untuk hapus.", current);
            if (input !== null) {
                localStorage.setItem('geminiApiKey', input.trim());
                localStorage.removeItem('validGeminiModel'); 
                alert("API Key berhasil disimpan!");
            }
        }

        async function fetchGeminiResponse(promptText, base64Img) {
            const apiKey = localStorage.getItem('geminiApiKey');
            if (!apiKey) return "Wah bro, API Key Gemini lu belum di-setting! Klik tombol '⚙️ SETTING' > '🔑 API KEY' di menu kiri dulu biar gw bisa jawab beneran ya.";
            
            let parts = [{ text: promptText || "Jelaskan gambar ini dengan detail." }];
            
            if (base64Img) {
                const mimeType = base64Img.split(';')[0].split(':')[1];
                const base64Data = base64Img.split(',')[1];
                parts.push({ inlineData: { mimeType: mimeType, data: base64Data } });
            }

            try {
                let targetModelName = localStorage.getItem('validGeminiModel');

                if (!targetModelName) {
                    console.log("Mencari model Gemini yang tersedia untuk API Key ini...");
                    const modelRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${apiKey}`);
                    const modelData = await modelRes.json();

                    if (modelData.error) throw new Error("Gagal ambil daftar model: " + modelData.error.message);

                    const validModels = modelData.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes('generateContent'));

                    if (validModels.length === 0) throw new Error("Gak ada model yang support generateContent di API Key lu bro.");

                    const bestModel = validModels.find(m => m.name.includes('gemini-1.5-flash')) 
                                   || validModels.find(m => m.name.includes('gemini-1.5-pro'))
                                   || validModels[0]; 

                    targetModelName = bestModel.name; 
                    localStorage.setItem('validGeminiModel', targetModelName);
                    console.log("Model terpilih otomatis:", targetModelName);
                }

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/${targetModelName}:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        contents: [{ parts: parts }],
                        tools: [{ googleSearch: {} }]
                    })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    localStorage.removeItem('validGeminiModel');
                    throw new Error(data.error.message);
                }
                
                return data.candidates[0].content.parts[0].text;

            } catch (error) {
                console.error(error);
                return `Waduh error bro pas narik data: ${error.message}`;
            }
        }

        function createNewChat(render = true) {
            const newId = Date.now().toString();
            appData.currentChatId = newId;
            appData.chats[newId] = { id: newId, title: "Obrolan Baru", history: [], totalWh: 0.0, totalMl: 0, totalPrompts: 0 };
            saveData(); 
            if (render) showCenterView();
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.add('collapsed');
        }

        function switchChat(id) {
            appData.currentChatId = id; saveData();
            appData.chats[id].history.length > 0 ? loadChatView(id) : showCenterView();
            if (window.innerWidth <= 768) document.getElementById('sidebar').classList.add('collapsed');
        }

        function renderHistory() {
            const hl = document.getElementById('historyList'); hl.innerHTML = '';
            Object.values(appData.chats).sort((a, b) => b.id - a.id).forEach(chat => {
                if (chat.history.length === 0 && chat.id !== appData.currentChatId) return;
                const div = document.createElement('div');
                div.className = `history-item ${chat.id === appData.currentChatId ? 'active' : ''}`;
                div.innerText = chat.title; div.onclick = () => switchChat(chat.id); hl.appendChild(div);
            });
        }

        function showCenterView() {
            document.getElementById('centerView').style.display = 'flex';
            document.getElementById('chatView').style.display = 'none';
            document.getElementById('floatingEnergy').style.display = 'none';
            document.getElementById('chatContainer').innerHTML = '';
            removeImage('init'); removeImage('chat');
        }

        function loadChatView(id) {
            const chat = appData.chats[id];
            document.getElementById('centerView').style.display = 'none';
            document.getElementById('chatView').style.display = 'flex';
            document.getElementById('floatingEnergy').style.display = 'flex';
            document.getElementById('chatContainer').innerHTML = '';
            chat.history.forEach(msg => {
                if (msg.role === 'ai') appendThinkingFinalUI(); 
                appendMessageUI(msg.role, msg.content, msg.image, false);
            });
            updateFloatingStats(chat.totalWh, chat.totalMl, false);
            removeImage('init'); removeImage('chat');
            scrollToBottom();
        }

        function scrollToBottom() {
            const scrollArea = document.getElementById('chatScrollArea');
            scrollArea.scrollTop = scrollArea.scrollHeight;
        }

        function handleImageFile(file, type) {
            if (!file.type.startsWith('image/')) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                currentImageBase64 = e.target.result;
                const prefix = type === 'init' ? 'init' : 'chat';
                document.getElementById(`${prefix}ImagePreviewContainer`).style.display = 'block';
                document.getElementById(`${prefix}ImagePreview`).src = currentImageBase64;
                document.getElementById(`${prefix}ImagePreview`).style.display = 'inline-block';
                document.getElementById(`${prefix}RemoveImgBtn`).style.display = 'block';
            };
            reader.readAsDataURL(file);
        }
        
        function setupDragAndDrop() {
            ['init', 'chat'].forEach(prefix => {
                const zone = document.getElementById(`${prefix}DropZone`);
                zone.addEventListener('dragover', (e) => { e.preventDefault(); zone.classList.add('dragover'); });
                zone.addEventListener('dragleave', () => zone.classList.remove('dragover'));
                zone.addEventListener('drop', (e) => { e.preventDefault(); zone.classList.remove('dragover'); if(e.dataTransfer.files.length) handleImageFile(e.dataTransfer.files[0], prefix); });
            });
        }
        
        function removeImage(type) { 
            currentImageBase64 = null; 
            document.getElementById(`${type}ImagePreviewContainer`).style.display = 'none';
            document.getElementById(`${type}ImagePreview`).style.display = 'none'; 
            document.getElementById(`${type}ImagePreview`).src = ''; 
            document.getElementById(`${type}RemoveImgBtn`).style.display = 'none'; 
        }

        function calculateEnergy(userText, aiText, hasImage) {
            const totalChars = (userText || "").length + (aiText || "").length;
            let energyWh = 0.5; energyWh += (totalChars * 0.005);
            if(hasImage) energyWh += 2.0;
            return parseFloat(energyWh.toFixed(1));
        }

        const wait = (ms) => new Promise(res => setTimeout(res, ms));

        async function showFlipModalSequence() {
            const overlay = document.getElementById('mainModalOverlay');
            const flipContainer = document.getElementById('flipCardContainer');
            const flipCard = document.getElementById('flipCardElement');
            const totalContainer = document.getElementById('totalEnergyContainer');
            
            const videoEl = flipCard.querySelector('.video-animasi');
            if(videoEl) { videoEl.currentTime = 0; videoEl.play().catch(e => console.log(e)); }

            flipCard.classList.remove('flipped');
            flipContainer.style.display = 'block'; totalContainer.style.display = 'none'; overlay.style.display = 'flex';

            await wait(5000); flipCard.classList.add('flipped'); await wait(4000); overlay.style.display = 'none';
        }

        let isDraggingWidget = false;
        function makeDraggable(el) {
            let startX, startY, initX, initY; let isMouseDown = false;
            el.addEventListener('mousedown', e => { 
                isMouseDown = true; isDraggingWidget = false; startX = e.clientX; startY = e.clientY; 
                const rect = el.getBoundingClientRect(); initX = rect.left; initY = rect.top; el.style.cursor = 'grabbing'; 
            });
            document.addEventListener('mousemove', e => { 
                if (!isMouseDown) return; 
                if (Math.abs(e.clientX - startX) > 3 || Math.abs(e.clientY - startY) > 3) isDraggingWidget = true;
                if (isDraggingWidget) {
                    el.style.left = `${initX + e.clientX - startX}px`; el.style.top = `${initY + e.clientY - startY}px`; 
                    el.style.bottom = 'auto'; el.style.right = 'auto'; el.style.transform = 'none'; 
                }
            });
            document.addEventListener('mouseup', () => { isMouseDown = false; el.style.cursor = 'grab'; setTimeout(() => isDraggingWidget = false, 0); });
        }
        makeDraggable(document.getElementById('floatingEnergy'));

        function animateOdometer(id, targetVal, suffix) {
            const container = document.getElementById(id); container.innerHTML = ''; 
            let valStr = targetVal.toString(); const numberWrapper = document.createElement('span'); numberWrapper.className = 'zoom-pulse';
            valStr.split('').forEach((char) => {
                if (isNaN(parseInt(char)) && char !== '.') {
                    const span = document.createElement('span'); span.className = 'static-char'; span.innerText = char; numberWrapper.appendChild(span);
                } else if (char === '.') {
                    const span = document.createElement('span'); span.className = 'static-char'; span.innerText = '.'; numberWrapper.appendChild(span);
                } else {
                    const targetNum = parseInt(char); const wrap = document.createElement('span'); wrap.className = 'odo-wrap';
                    const track = document.createElement('div'); track.className = 'odo-track';
                    let sequence = ''; const rolls = 1; 
                    for (let r = 0; r <= rolls; r++) { let max = (r === rolls) ? targetNum : 9; for(let n=0; n<=max; n++) sequence += `<div>${n}</div>`; }
                    track.innerHTML = sequence; wrap.appendChild(track); numberWrapper.appendChild(wrap);
                    setTimeout(() => { const targetIndex = (rolls * 10) + targetNum; track.style.transform = `translateY(-${targetIndex * 1.1}em)`; }, 50);
                }
            });
            container.appendChild(numberWrapper); const sufSpan = document.createElement('span'); sufSpan.className = 'odo-suffix'; sufSpan.innerHTML = suffix; 
            container.appendChild(sufSpan);
        }

        document.getElementById('floatingEnergy').addEventListener('click', (e) => {
            if (isDraggingWidget) return; 
            const chatData = appData.chats[appData.currentChatId]; if(!chatData) return;
            document.getElementById('mainModalOverlay').style.display = 'flex'; document.getElementById('flipCardContainer').style.display = 'none'; document.getElementById('totalEnergyContainer').style.display = 'block';
            animateOdometer('modal-total-wh', chatData.totalWh, 'WH'); animateOdometer('modal-total-ml', chatData.totalMl, 'ML Air');
        });

        function closeModals() { document.getElementById('mainModalOverlay').style.display = 'none'; }
        function handleInitialSend(e) { e.preventDefault(); processInput(document.getElementById('initialPrompt')); }
        function handleChatSend(e) { e.preventDefault(); processInput(document.getElementById('chatPrompt')); }

        function formatMarkdown(text) {
            return text.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\*(.*?)\*/g, '<i>$1</i>').replace(/\n/g, '<br>');
        }

        async function processInput(inputEl) {
            const text = inputEl.value.trim();
            if (!text && !currentImageBase64) return;
            
            const chat = appData.chats[appData.currentChatId];
            if (chat.history.length === 0) chat.title = text ? (text.length > 25 ? text.substring(0, 25) + '...' : text) : 'Gambar Terunggah';
            
            document.getElementById('centerView').style.display = 'none';
            document.getElementById('chatView').style.display = 'flex';
            document.getElementById('floatingEnergy').style.display = 'flex';

            const userImg = currentImageBase64;
            inputEl.value = ''; removeImage('init'); removeImage('chat');

            appendMessageUI('user', text, userImg);
            chat.history.push({ role: 'user', content: text, image: userImg });
            chat.totalPrompts += 1; chat.totalMl += 50; 

            const thinkingId = appendThinkingLoadingUI();
            scrollToBottom();

            const aiRespText = await fetchGeminiResponse(text, userImg);

            const thinkRow = document.getElementById(thinkingId);
            if(thinkRow) {
                const starEl = thinkRow.querySelector('.thinking-star'); if(starEl) starEl.classList.remove('spin');
                const textEl = document.getElementById(`text-${thinkingId}`); if(textEl) textEl.innerHTML = `Tampilkan Alur Berpikir <span style="font-size:10px; margin-left:5px;">▼</span>`;
            }

            appendMessageUI('ai', formatMarkdown(aiRespText));
            chat.history.push({ role: 'ai', content: aiRespText });

            const turnEnergy = calculateEnergy(text, aiRespText, userImg !== null);
            chat.totalWh += turnEnergy; saveData();
            updateFloatingStats(chat.totalWh, chat.totalMl, true);

            await showFlipModalSequence();
            await generateAndPrintReceipt(chat); 
        }

        function appendMessageUI(role, text, imageBase64 = null, animate = true) {
            const row = document.createElement('div'); row.className = `message-row ${role}`;
            const content = document.createElement('div'); content.className = 'message-content';
            if (imageBase64) content.innerHTML += `<img src="${imageBase64}" class="msg-image-preview"><br>`;
            if (text) content.innerHTML += text;
            row.appendChild(content); document.getElementById('chatContainer').appendChild(row);
            if (animate) scrollToBottom();
        }

        function appendThinkingLoadingUI() {
            const row = document.createElement('div'); row.className = `message-row thinking`; row.id = 'think-' + Date.now();
            row.innerHTML = `<div class="thinking-content"><span class="thinking-star spin">✦</span><span class="thinking-text" id="text-${row.id}">Generative AI Sedang Memproses...</span></div>`;
            document.getElementById('chatContainer').appendChild(row); return row.id;
        }

        function appendThinkingFinalUI() {
            const row = document.createElement('div'); row.className = `message-row thinking`;
            row.innerHTML = `<div class="thinking-content">Tampilkan Alur Berpikir <span style="font-size:10px; margin-left:5px;">▼</span></div>`;
            document.getElementById('chatContainer').appendChild(row);
        }

        function updateFloatingStats(wh, ml, animate) {
            const fe = document.getElementById('floatingEnergy');
            document.getElementById('floating-total-wh').innerText = wh.toFixed(1);
            document.getElementById('floating-total-ml').innerText = ml;
            if (animate) { fe.classList.remove('pulse'); void fe.offsetWidth; fe.classList.add('pulse'); }
        }

        let globalPrintCharacteristic = null;

        async function connectBluetoothPrinter() {
            try {
                const device = await navigator.bluetooth.requestDevice({
                    acceptAllDevices: true,
                    optionalServices: ['000018f0-0000-1000-8000-00805f9b34fb', 'e7810a71-73ae-499d-8c15-faa9aef0c3f2', '49535343-fe7d-4ae5-8fa9-9fafd205e455'] 
                });
                console.log('Menyambungkan ke:', device.name);
                const server = await device.gatt.connect(); const services = await server.getPrimaryServices();
                for (const service of services) {
                    const characteristics = await service.getCharacteristics();
                    for (const char of characteristics) {
                        if (char.properties.write || char.properties.writeWithoutResponse) { globalPrintCharacteristic = char; alert(`Berhasil terhubung ke Printer: ${device.name}!`); return; }
                    }
                }
                alert('Gagal mendeteksi jalur print di perangkat ini.');
            } catch (error) { console.error('Batal koneksi:', error); }
        }

        function formatLine(leftText, rightText, totalLength = 32) {
            const spacesNeeded = totalLength - (leftText.length + rightText.length);
            return leftText + " ".repeat(Math.max(0, spacesNeeded)) + rightText;
        }

        function loadImageAsESC_POS(imageSrc) {
            return new Promise((resolve, reject) => {
                const img = new Image();
                
                img.onload = () => {
                    try {
                        const width = 384; 
                        const height = Math.round((img.height * width) / img.width);
                        
                        const offscreen = document.createElement('canvas');
                        offscreen.width = width;
                        offscreen.height = height;
                        const octx = offscreen.getContext('2d', { willReadFrequently: true });
                        
                        octx.fillStyle = '#FFFFFF';
                        octx.fillRect(0, 0, width, height);
                        octx.drawImage(img, 0, 0, width, height);

                        const imgData = octx.getImageData(0, 0, width, height).data;

                        const xL = (width / 8) % 256;
                        const xH = Math.floor((width / 8) / 256);
                        const yL = height % 256;
                        const yH = Math.floor(height / 256);

                        let data = [
                            0x1D, 0x76, 0x30, 0x00, xL, xH, yL, yH 
                        ]; 

                        for (let y = 0; y < height; y++) {
                            for (let x = 0; x < width; x += 8) {
                                let byte = 0;
                                for (let b = 0; b < 8; b++) {
                                    let i = ((y * width) + x + b) * 4;
                                    if (x + b < width) {
                                        let r = imgData[i];
                                        let g = imgData[i+1];
                                        let b_val = imgData[i+2];
                                        let a = imgData[i+3];
                                        
                                        let luminance = (r * 0.299 + g * 0.587 + b_val * 0.114);
                                        if (a > 128 && luminance < 128) {
                                            byte |= (1 << (7 - b)); 
                                        }
                                    }
                                }
                                data.push(byte);
                            }
                        }
                        resolve(new Uint8Array(data));
                    } catch (err) {
                        reject(new Error("Akses gambar diblokir browser! Pastiin jalanin lewat Localhost (XAMPP/Live Server VSCode), jangan double-click file HTML-nya."));
                    }
                };
                
                img.onerror = () => reject(new Error(`File ${imageSrc} ngga ketemu! Pastiin namanya bener.`));
                img.src = imageSrc;
            });
        }

        async function generateAndPrintReceipt(c) {
            const wh = c.totalWh.toFixed(1);
            const ml = c.totalMl;
            const co2 = (c.totalWh * 0.85).toFixed(1); 
            
            const now = new Date();
            const dateStr = now.toLocaleDateString('id-ID', {day: '2-digit', month: '2-digit', year: 'numeric'});
            const timeStr = now.toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'}).replace(':', '.');
            const namaUser = "Najmu"; 
            
            const dashedLine = "-".repeat(32);
            
            const strukBodyTextPlain = 
                dashedLine + "\n" +
                formatLine("Tanggal:", `${dateStr} (${timeStr} WIB)`) + "\n" +
                formatLine("Nama:", namaUser) + "\n" +
                dashedLine + "\n" +
                formatLine("Air Pendingin Server", `${ml} ML`) + "\n" +
                formatLine("Listrik", `${wh} WH`) + "\n" +
                formatLine("Emisi Karbon (CO2)", `${co2} Gram`) + "\n\n" +
                dashedLine + "\n";

            const footerTotalText = 
                "TOTAL\n" +
                formatLine("KERUSAKAN:", "BUMI YANG BAYAR") + "\n\n";

            document.getElementById('receiptModalOverlay').style.display = 'flex';
            document.getElementById('btnTutupPrintDebug').style.display = 'none';
            const statusText = document.getElementById('printStatusText');

            try {
                statusText.innerHTML = "Memuat <b>header.jpeg</b>...";
                const headerBytes = await loadImageAsESC_POS('header.jpeg');
                
                statusText.innerHTML = "Memuat <b>footer.jpeg</b>...";
                const footerBytes = await loadImageAsESC_POS('footer.jpeg');

                if (globalPrintCharacteristic) {
                    statusText.innerHTML = "Mencetak ke Printer...";
                    
                    const ESC_INIT = "\x1B\x40";
                    const ESC_BOLD_ON = "\x1B\x45\x01";
                    const ESC_BOLD_OFF = "\x1B\x45\x00";

                    await printByteArray(new Uint8Array([0x1B, 0x40, 0x1B, 0x61, 0x01])); 
                    await printByteArray(headerBytes);
                    await wait(200);

                    const encoder = new TextEncoder();
                    await printByteArray(new Uint8Array([0x1B, 0x61, 0x00])); 
                    await printByteArray(encoder.encode(strukBodyTextPlain.replace(/\n/g, '\r\n')));
                    await printByteArray(encoder.encode(ESC_BOLD_ON + footerTotalText.replace(/\n/g, '\r\n') + ESC_BOLD_OFF));
                    await wait(200);

                    await printByteArray(new Uint8Array([0x1B, 0x61, 0x01])); 
                    await printByteArray(footerBytes);
                    
                    // =========================================================
                    // PERBAIKAN FINAL: JEDA NAFAS SEBELUM KERTAS DIDORONG
                    // =========================================================
                    statusText.innerHTML = "Menyelesaikan cetakan...";
                    await wait(1000); // Tunggu 1.5 detik biar mesin bener-bener kelar nge-burn gambar footer

                    // Baru sekarang kita aman buat ngasih 8x enter
                    await printByteArray(new Uint8Array([0x0A, 0x0A, 0x0A, 0x0A, 0x0A, 0x0A, 0x0A, 0x0A])); 

                    statusText.innerHTML = "🖨️ Struk Fisik Berhasil Dicetak!";
                    await wait(1500);
                    document.getElementById('receiptModalOverlay').style.display = 'none';
                } else {
                    statusText.innerHTML = "✅ Simulasi Berhasil!<br>File gambar <b>Aman</b> dan tidak ada error.<br><br><span style='font-size:12px; color:#ffb0b0;'>(Printer Bluetooth saat ini belum tersambung)</span>";
                    await wait(3000);
                    document.getElementById('receiptModalOverlay').style.display = 'none';
                }

            } catch (e) {
                console.error("Gagal nyetak / simulasi:", e);
                statusText.innerHTML = `❌ Waduh Error Bro:<br><span style='color:#ff4c4c; font-size:14px;'>${e.message}</span><br><br><span style='font-size:12px;'>Pastikan nama file pas huruf besar/kecilnya dan ada di folder yang sama!</span>`;
                document.getElementById('btnTutupPrintDebug').style.display = 'block';
            }
        }

      // ======================================================================
        // PERBAIKAN: THROTTLING BLUETOOTH (Anti GATT Error / Anti Tersedak)
        // ======================================================================
        async function printByteArray(uint8Array) {
            try {
                // CHUNK SIZE diturunin drastis ke 40. Ini batas paling aman 
                // buat semua jenis Bluetooth Low Energy (BLE) di dunia.
                const CHUNK_SIZE = 40; 
                
                for (let i = 0; i < uint8Array.length; i += CHUNK_SIZE) { 
                    const chunk = uint8Array.slice(i, i + CHUNK_SIZE);
                    await globalPrintCharacteristic.writeValue(chunk);
                    
                    // JEDA DITAMBAH JADI 60ms. 
                    // Printer thermal butuh waktu fisik buat nge-burn titik hitam ke kertas.
                    await new Promise(resolve => setTimeout(resolve, 60));
                }
            } catch (error) { 
                console.error('Error saat ngirim byte array:', error); 
                throw error;
            }
        }
    </script>
